name: Build Android App

on:
  push:
    branches: [ main, master, 'app-*' ]
  pull_request:
  workflow_dispatch:

# Allow the workflow's GITHUB_TOKEN to create releases / upload assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The builder commits a `build_target` file (apk | aab | key) to tell this
      # workflow what to produce. Anything else (main, PRs) defaults to apk.
      - name: Resolve build target
        id: target
        run: |
          T=$(cat build_target 2>/dev/null | tr -d '[:space:]')
          T=${T:-apk}
          case "$T" in apk|aab|key) ;; *) T=apk ;; esac
          echo "value=$T" >> "$GITHUB_OUTPUT"
          echo "Build target: $T"

      - name: Set up JDK 17
        if: steps.target.outputs.value != 'key'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        if: steps.target.outputs.value != 'key'
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        if: steps.target.outputs.value != 'key'
        run: chmod +x gradlew

      # The builder pushes the project's keystore + credentials into the branch for
      # APK/AAB builds (the key is no longer hosted in the release). If present in
      # the checked-out tree, expose it to Gradle so the artifact is signed with it.
      - name: Load project signing key
        id: signing
        if: (steps.target.outputs.value == 'apk' || steps.target.outputs.value == 'aab') && startsWith(github.ref_name, 'app-')
        run: |
          if [ -f keystore.jks ] && [ -f keystore-credentials.txt ]; then
            ALIAS=$(grep -i '^Key alias' keystore-credentials.txt | sed 's/.*: *//' | tr -d '[:space:]')
            STOREPASS=$(grep -i '^Store password' keystore-credentials.txt | sed 's/.*: *//' | tr -d '[:space:]')
            KEYPASS=$(grep -i '^Key password' keystore-credentials.txt | sed 's/.*: *//' | tr -d '[:space:]')
            {
              echo "SIGN_STORE_FILE=$PWD/keystore.jks"
              echo "SIGN_STORE_PASSWORD=$STOREPASS"
              echo "SIGN_KEY_ALIAS=$ALIAS"
              echo "SIGN_KEY_PASSWORD=$KEYPASS"
            } >> "$GITHUB_ENV"
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Signing with the project's key pushed by the builder (alias: $ALIAS)."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "No project key pushed; using the default signing key."
          fi

      - name: Build release APK
        if: steps.target.outputs.value == 'apk'
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Build release AAB
        if: steps.target.outputs.value == 'aab'
        run: ./gradlew :app:bundleRelease --stacktrace

      # Record which certificate signed the APK so the user can verify the key.
      - name: Record signing fingerprint
        if: steps.target.outputs.value == 'apk' && startsWith(github.ref_name, 'app-')
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/release/app-release.apk \
            | grep -i "SHA-256" > signing-info.txt || true
          echo "Signed by project key: ${{ steps.signing.outputs.signed }}" >> signing-info.txt
          cat signing-info.txt

      # Generate a fresh upload keystore with auto-generated credentials and a
      # plain-text file describing them, so the user can download both.
      - name: Generate keystore
        if: steps.target.outputs.value == 'key'
        run: |
          APPNAME=$(jq -r '.appName // "WebToApp"' app/src/main/assets/app_settings.json 2>/dev/null || echo WebToApp)
          ALIAS=upload
          STOREPASS=$(openssl rand -hex 12)
          KEYPASS=$STOREPASS
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$KEYPASS" \
            -dname "CN=$APPNAME, OU=Mobile, O=WebToApp, L=NA, ST=NA, C=US"
          {
            echo "Keystore credentials for $APPNAME"
            echo "===================================="
            echo "Keystore file : keystore.jks"
            echo "Key alias     : $ALIAS"
            echo "Store password: $STOREPASS"
            echo "Key password  : $KEYPASS"
            echo "Validity      : 10000 days (RSA 2048)"
            echo ""
            echo "Keep this file safe - you need this exact keystore and these"
            echo "passwords to publish updates of your app on Google Play."
          } > keystore-credentials.txt

      # Keep the APK as a CI artifact for non-builder builds (main / PRs).
      - name: Upload APK artifact
        if: steps.target.outputs.value == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      # If the build branch was deleted while this run was building (the user
      # deleted the project), skip publishing so we don't re-create the release.
      - name: Check build branch still exists
        id: branch_check
        if: startsWith(github.ref_name, 'app-')
        run: |
          if git ls-remote --exit-code --heads origin "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Branch ${{ github.ref_name }} was deleted; skipping release."
          fi

      # Gather the produced file(s) for this target into a single folder.
      - name: Collect artifacts
        if: startsWith(github.ref_name, 'app-') && steps.branch_check.outputs.exists == 'true'
        run: |
          mkdir -p dist
          case "${{ steps.target.outputs.value }}" in
            apk) cp app/build/outputs/apk/release/app-release.apk dist/
                 [ -f signing-info.txt ] && cp signing-info.txt dist/ || true ;;
            aab) cp app/build/outputs/bundle/release/app-release.aab dist/ ;;
            key) cp keystore.jks keystore-credentials.txt dist/ ;;
          esac
          ls -la dist

      # Publish the artifact(s) onto the project's release (tag == branch name).
      # Assets accumulate, so one release holds the app's APK, AAB and keystore.
      - name: Publish to release
        if: startsWith(github.ref_name, 'app-') && steps.branch_check.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Automated build from the web2app builder for branch ${{ github.ref_name }} (commit ${{ github.sha }})."
          files: dist/*
          make_latest: "false"
